name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Ansible Galaxy collections
        run: uv run ansible-galaxy collection install -r requirements.yml

      - run: uv run yamllint .

      - run: uv run ansible-lint

      - name: Ansible syntax check
        run: uv run ansible-playbook -i inventory.yml playbook.yml --syntax-check

      - name: Shellcheck shell scripts
        # The .j2 template is the heaviest shell logic in the repo. Its Jinja
        # expressions sit in double-quoted RHS positions so shellcheck parses
        # the file as valid bash without rendering.
        run: |
          shellcheck scripts/*.sh
          shellcheck -s bash roles/ddns/templates/ddns.sh.j2
