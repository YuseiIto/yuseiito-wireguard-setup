name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install Ansible Galaxy collections
        run: uv run ansible-galaxy collection install -r requirements.yml

      - name: Provide a throwaway vault password for linting
        # .vault_pass は gitignore 済みで CI には来ない。ansible.cfg が
        # vault_password_file で参照するため、ファイルが存在しないと ansible-lint /
        # --syntax-check が "vault password file not found" で即死する。
        # lint は復号失敗を warning として無視し、--syntax-check は vault の値を
        # 復号しないので、ダミー値で十分。秘密は CI に持ち込まない。
        run: echo "ci-lint-only" > .vault_pass

      - run: uv run yamllint .

      - run: uv run ansible-lint

      - name: Ansible syntax check
        run: uv run ansible-playbook -i inventory.yml playbook.yml --syntax-check

      - name: Shellcheck shell scripts
        # .j2 だが Jinja 式が double-quoted RHS にしか居ないので、レンダなしで通る。
        run: |
          shellcheck scripts/*.sh
          shellcheck -s bash roles/ddns/templates/ddns.sh.j2
