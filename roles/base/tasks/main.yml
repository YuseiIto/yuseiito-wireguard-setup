- name: Set timezone
  community.general.timezone:
    name: Asia/Tokyo

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - unattended-upgrades
      - apt-listchanges
      - ufw
      - jq
    update_cache: true

- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99-auto-upgrades
    owner: root
    group: root
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Configure unattended-upgrades to auto-reboot
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50-unattended-upgrades-local
    owner: root
    group: root
    mode: '0644'
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "04:00";

- name: Enable persistent IPv6 RA acceptance + IP forwarding (v4 + v6)
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/10-wg-forward.conf
    state: present
    reload: true
  loop:
    # accept_ra=2 は forwarding=1 より前に置く: forwarding を入れた途端、既定の
    # accept_ra=1 では RA が無視されて v6 デフォルトルートが消える。
    # NIC 名は v4 fact から取る — v6 が壊れた状況 (=2 が要る状況) で v6 fact が消える。
    - { name: net.ipv6.conf.default.accept_ra, value: '2' }
    - { name: "net.ipv6.conf.{{ ansible_default_ipv4.interface | default('eth0') }}.accept_ra", value: '2' }
    - { name: net.ipv4.ip_forward, value: '1' }
    - { name: net.ipv6.conf.all.forwarding, value: '1' }

- name: Enable IPv6 in UFW
  # UFW は /etc/default/ufw を enable/reload 時にしか読まない。後続 allow ルールが
  # v6 にも適用されるよう、IPV6=yes を先に書いて即 reload する (下の flush_handlers)。
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: 'IPV6=yes'
    owner: root
    group: root
    mode: '0644'
    create: true  # --check 時は ufw 未インストールでこのファイルが無いため
  notify: Reload UFW

- name: Flush handlers so IPV6=yes takes effect before subsequent UFW tasks
  ansible.builtin.meta: flush_handlers

- name: UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: UFW allow SSH and WireGuard
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - port: 22
      proto: tcp
    - port: "{{ wg_port }}"
      proto: udp

- name: UFW enable
  community.general.ufw:
    state: enabled
